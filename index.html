<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEV75 Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div class="left-panel">
            <div class="panel-content">
                <h1>✳</h1>
                <h1>A Brief Inquiry<br>Into Online Systems</h1>
                <p>Irony is okay, but sincerity is better. We’ve designed a system that functions without the mask.</p>
            </div>
            <div class="footer">
                © 2026 DEV75.
            </div>
        </div>

        <div class="form-panel">
            <div class="form-container">
                <h2 class="dev-logo">DEV75</h2>
                
                <div class="header-section">
                    <h3>Welcome Back!</h3>
                    <p class="signup-text">
                        Don't have an account? <a href="#">Create a new account now,</a> 
                        <span>it's FREE! Takes less than a minute.</span>
                    </p>
                </div>

                <form>
                    <div class="input-field">
                        <label>Email</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="input-field">
                        <label>Password</label>
                        <input type="password" placeholder="Enter your password" required>
                    </div>

                    <div class="options-row">
                        <label class="remember-me">
                            <input type="checkbox" name="remember"> 
                            Remember me for 1 week
                        </label>
                    </div>
                    
                    <button type="submit" class="login-btn">Login Now</button>
                    
                    <p class="forgot-link">Forget password? <a href="#">Click here</a></p>
                </form>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
